# Free Claude Code - Docker Compose
# Usage: docker-compose up -d

services:
  free-claude-code:
    build:
      context: .
      dockerfile: Dockerfile
    image: free-claude-code:latest
    container_name: free-claude-code
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      # Provider selection: nvidia_nim, open_router, or lmstudio
      - MODEL=${MODEL:-nvidia_nim/stepfun-ai/step-3.5-flash}

      # NVIDIA NIM API key
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}

      # OpenRouter API key
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # Other provider API keys
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - CODESTRAL_API_KEY=${CODESTRAL_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - WAFER_API_KEY=${WAFER_API_KEY:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}

      # Local provider base URLs
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLAMACPP_BASE_URL=${LLAMACPP_BASE_URL:-http://host.docker.internal:8080/v1}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # Show free models first in the model list
      - SHOW_FREE_MODELS_FIRST=${SHOW_FREE_MODELS_FIRST:-true}
      # Only show free models in the model list
      - ONLY_SHOW_FREE_MODELS=${ONLY_SHOW_FREE_MODELS:-false}
      # Free models list (comma-separated) - models considered free for labeling
      - FREE_MODELS_LIST=${FREE_MODELS_LIST:-}

      # Thinking output
      - ENABLE_OPUS_THINKING=${ENABLE_OPUS_THINKING:-}
      - ENABLE_SONNET_THINKING=${ENABLE_SONNET_THINKING:-}
      - ENABLE_HAIKU_THINKING=${ENABLE_HAIKU_THINKING:-}
      - ENABLE_MODEL_THINKING=${ENABLE_MODEL_THINKING:-true}

      # Provider proxy configuration
      - NVIDIA_NIM_PROXY=${NVIDIA_NIM_PROXY:-}
      - OPENROUTER_PROXY=${OPENROUTER_PROXY:-}
      - MISTRAL_PROXY=${MISTRAL_PROXY:-}
      - CODESTRAL_PROXY=${CODESTRAL_PROXY:-}
      - LMSTUDIO_PROXY=${LMSTUDIO_PROXY:-}
      - LLAMACPP_PROXY=${LLAMACPP_PROXY:-}
      - KIMI_PROXY=${KIMI_PROXY:-}
      - WAFER_PROXY=${WAFER_PROXY:-}
      - OPENCODE_PROXY=${OPENCODE_PROXY:-}
      - OPencode_GO_PROXY=${OPENCODE_GO_PROXY:-}
      - ZAI_PROXY=${ZAI_PROXY:-}
      - FIREWORKS_PROXY=${FIREWORKS_PROXY:-}
      - GEMINI_PROXY=${GEMINI_PROXY:-}
      - GROQ_PROXY=${GROQ_PROXY:-}
      - CEREBRAS_PROXY=${CEREBRAS_PROXY:-}

      # Provider rate limiting
      - PROVIDER_RATE_LIMIT=${PROVIDER_RATE_LIMIT:-40}
      - PROVIDER_RATE_WINDOW=${PROVIDER_RATE_WINDOW:-60}
      - PROVIDER_MAX_CONCURRENCY=${PROVIDER_MAX_CONCURRENCY:-5}

      # HTTP client timeouts (seconds)
      - HTTP_READ_TIMEOUT=${HTTP_READ_TIMEOUT:-300}
      - HTTP_WRITE_TIMEOUT=${HTTP_WRITE_TIMEOUT:-10}
      - HTTP_CONNECT_TIMEOUT=${HTTP_CONNECT_TIMEOUT:-2}

      # Optional server API key (Anthropic-style)
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-freecc}

      # Open /admin in the default browser when fcc-server becomes healthy (set 0/false/no to disable)
      - FCC_OPEN_BROWSER=${FCC_OPEN_BROWSER:-true}

      # Messaging platform (optional)
      - MESSAGING_PLATFORM=${MESSAGING_PLATFORM:-discord}
      - MESSAGING_RATE_LIMIT=${MESSAGING_RATE_LIMIT:-1}
      - MESSAGING_RATE_WINDOW=${MESSAGING_RATE_WINDOW:-1}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - ALLOWED_DISCORD_CHANNELS=${ALLOWED_DISCORD_CHANNELS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ALLOWED_TELEGRAM_USER_ID=${ALLOWED_TELEGRAM_USER_ID:-}

      # Voice transcription (optional)
      - VOICE_NOTE_ENABLED=${VOICE_NOTE_ENABLED:-false}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - HF_TOKEN=${HF_TOKEN:-}

      # Agent config
      - ALLOWED_DIR=${ALLOWED_DIR:-}
      - CLAUDE_WORKSPACE=${CLAUDE_WORKSPACE:-./agent_workspace}

      # Admin UI access control
      # Set to true to allow admin UI access from non-loopback hosts (e.g., remote)
      - ADMIN_UI_ALLOW_REMOTE=${ADMIN_UI_ALLOW_REMOTE:-false}

      # Local Anthropic web_search / web_fetch handling (performs outbound HTTP; on by default)
      - ENABLE_WEB_SERVER_TOOLS=${ENABLE_WEB_SERVER_TOOLS:-true}
      - WEB_FETCH_ALLOWED_SCHEMES=${WEB_FETCH_ALLOWED_SCHEMES:-http,https}
      - WEB_FETCH_ALLOW_PRIVATE_NETWORKS=${WEB_FETCH_ALLOW_PRIVATE_NETWORKS:-false}

      # Structured TRACE logs: lines with `"trace": true` merge ingress/routing/cli/provider/egress
      # stages. Conversation text is logged in those payloads (verbatim). Values under keys named
      # like ``api_key`` / ``authorization`` are redacted. Raw transport payloads still require
      # the LOG_RAW_* toggles below.
      #
      # Verbose diagnostics (avoid logging raw prompts / SSE bodies in production)
      - DEBUG_PLATFORM_EDITS=${DEBUG_PLATFORM_EDITS:-false}
      - DEBUG_SUBAGENT_STACK=${DEBUG_SUBAGENT_STACK:-false}
      # When true, also allows DEBUG-level httpx/httpcore/telegram log noise (not just payload logging).
      - LOG_RAW_API_PAYLOADS=${LOG_RAW_API_PAYLOADS:-false}
      - LOG_RAW_SSE_EVENTS=${LOG_RAW_SSE_EVENTS:-false}
      # When true, log full exception text and tracebacks for unhandled errors (may leak request-derived data).
      - LOG_API_ERROR_TRACEBACKS=${LOG_API_ERROR_TRACEBACKS:-false}
      # When true, log message/transcription text previews in messaging adapters only (handler ingress always TRACEs verbatim text separately).
      - LOG_RAW_MESSAGING_CONTENT=${LOG_RAW_MESSAGING_CONTENT:-false}
      # When true, log full Claude CLI stderr, non-JSON stdout lines, and parser error text.
      - LOG_RAW_CLI_DIAGNOSTICS=${LOG_RAW_CLI_DIAGNOSTICS:-false}
      # When true, log full exception and CLI error message strings in messaging (may leak user content).
      - LOG_MESSAGING_ERROR_DETAILS=${LOG_MESSAGING_ERROR_DETAILS:-false}
    volumes:
      # Optional: persist workspace
      - ./agent_workspace:/app/agent_workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
